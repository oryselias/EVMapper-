server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ev_platform
    username: postgres
    password: pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        ddl-auto: update

  security:
    user:
      name: admin
      password: admin

# JWT Configuration
jwt:
  secret: evmapper-secret-key-that-should-be-at-least-256-bits-long-for-security
  expiration: 86400000  # 24 hours in milliseconds

# Routing Configuration
routing:
  api:
    key:  # Add OpenRouteService API key here if needed
